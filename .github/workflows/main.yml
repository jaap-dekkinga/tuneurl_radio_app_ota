name: iOS Build Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build TuneURLRadio (iOS Simulator)
    runs-on: macos-14

    env:
      WORKSPACE: TuneURLRadio.xcworkspace
      SCHEME: TuneURLRadio
      DESTINATION: "platform=iOS Simulator,name=iPhone 15,OS=latest"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.x
        run: |
          # Pick the highest-version Xcode 16.x present on the runner.
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "::error::No Xcode 16.x found on this runner."
            echo "Available Xcodes:"
            ls -d /Applications/Xcode*.app || true
            exit 1
          fi
          echo "Selected: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          echo "DEVELOPER_DIR=$XCODE_PATH/Contents/Developer" >> "$GITHUB_ENV"

      - name: Show selected toolchain
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            Pods
            ~/.cocoapods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install Pods
        run: |
          if [ -f Gemfile ]; then
            bundle exec pod install --repo-update
          else
            pod install --repo-update
          fi

      - name: List available simulators (debug aid)
        run: xcrun simctl list devices available | head -50

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          mkdir -p build
          xcodebuild build \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination "$DESTINATION" \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=YES \
            | tee build/xcodebuild.log

      - name: Upload xcodebuild log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: build/xcodebuild.log
          retention-days: 7
